# =============================================================
# NGINX CONFIG — for React SPA (Single Page Application)
# =============================================================
# Why do we need a custom nginx config?
#
# React Router handles routing in the BROWSER (client-side).
# Routes like /dashboard or /settings only exist in JavaScript.
# nginx doesn't know about them — it looks for actual files.
#
# Without this config:
#   User visits  →  yourdomain.com/dashboard
#   nginx looks  →  /usr/share/nginx/html/dashboard  (doesn't exist!)
#   nginx returns → 404 Not Found  ❌
#
# With this config:
#   User visits  →  yourdomain.com/dashboard
#   nginx tries  →  /dashboard file? No. /dashboard/ folder? No.
#   nginx serves →  /index.html  ✓  (React Router takes over)
# =============================================================

server {
    # Listen on port 80 (standard HTTP)
    listen 80;

    # The root folder where our built React files live
    root /usr/share/nginx/html;

    # Default file to serve when visiting /
    index index.html;

    location / {
        # try_files checks for a matching file or folder.
        # If neither exists, fall back to index.html.
        # This is the magic line that makes React Router work.
        try_files $uri $uri/ /index.html;
    }

    # Optional: tell browsers to cache static assets for 1 year.
    # Vite adds content hashes to filenames (e.g. main.abc123.js)
    # so caching is safe — new deploys get new filenames.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
