# =============================================================
# DOCKER COMPOSE — runs all services together
# =============================================================
# What is Docker Compose?
#   A tool to define and run MULTIPLE containers as one stack.
#   Instead of running 4 separate docker commands, you run one:
#     docker compose up
#
# How containers talk to each other:
#   Inside this compose file, each service name IS the hostname.
#   So the backend connects to postgres at "postgres:5432"
#   NOT at "localhost:5432" — localhost means the container itself.
#
# Port mapping syntax:  "HOST:CONTAINER"
#   "8000:8000" means: your computer's port 8000 → container's port 8000
#   "5432:5432" means: your computer's port 5432 → container's port 5432
# =============================================================          

services:

  # ────────────────────────────────────────────────────────────
  # POSTGRES — the relational database
  # ────────────────────────────────────────────────────────────
  postgres:
    # Use the official postgres image — no build needed
    image: postgres:16-alpine

    # Environment variables configure postgres on first startup
    environment:
      POSTGRES_DB: termsscope       # Database name to create
      POSTGRES_USER: postgres       # Superuser username
      POSTGRES_PASSWORD: postgres   # Superuser password

    ports:
      - "5434:5432"   # Expose to your machine so you can use TablePlus/pgAdmin

    # Named volume: Docker manages where data is stored on disk.
    # Data persists even if you stop/remove the container.
    # Without this, your database resets every time you restart.
    volumes:
      - pgdata:/var/lib/postgresql/data

    # Healthcheck: tells Docker when postgres is ACTUALLY ready.
    # Other services use "condition: service_healthy" to wait for this.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s    # Check every 5 seconds
      timeout: 3s     # Wait max 3 seconds for a response
      retries: 5      # Mark unhealthy after 5 consecutive failures

  # ────────────────────────────────────────────────────────────
  # REDIS — the cache / session store
  # ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine

    ports:
      - "6379:6379"   # Expose so you can connect with Redis CLI/GUI

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ────────────────────────────────────────────────────────────
  # BACKEND — FastAPI application
  # ────────────────────────────────────────────────────────────
  backend:
    # Both "build" and "image" are set:
    #   - build: used locally with "docker compose up --build"
    #   - image: used by "docker compose pull/push" to target Docker Hub
    build: ./backend
    image: ${DOCKER_USERNAME}/termsscope-backend:latest

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env.docker

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  # ────────────────────────────────────────────────────────────
  # FRONTEND — React app served by nginx
  # ────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    image: ${DOCKER_USERNAME}/termsscope-frontend:latest

    ports:
      - "80:80"   # Access the app at http://localhost (port 80 is default HTTP)

    depends_on:
      - backend


# ────────────────────────────────────────────────────────────
# NAMED VOLUMES declaration
# ────────────────────────────────────────────────────────────
# You must declare named volumes here at the top level.
# Docker creates and manages these automatically.
volumes:
  pgdata:   # Used by the postgres service above
