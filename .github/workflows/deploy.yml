name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: termsscope
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install Python dependencies
        run: uv sync --extra dev
        working-directory: backend

      - name: Run database migrations
        run: uv run alembic upgrade head
        working-directory: backend

      - name: Run tests
        run: uv run pytest tests/ -v
        working-directory: backend

  build-and-push:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/termsscope-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/termsscope-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          envs: SECRET_KEY,OPENAI_API_KEY,ANTHROPIC_API_KEY,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,DO_HOST,DOCKER_USERNAME
          script: |
            cd /root/TermsScope_Analytics
            git pull origin main

            cat > ./backend/.env.docker <<EOF
            APP_NAME=TermsScope Analytics
            APP_ENV=production
            DEBUG=false
            SECRET_KEY=${SECRET_KEY}
            DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/termsscope
            DATABASE_URL_SYNC=postgresql+psycopg://postgres:postgres@postgres:5432/termsscope
            REDIS_URL=redis://redis:6379/0
            CACHE_TTL_SECONDS=86400
            DEFAULT_LLM_PROVIDER=openai
            DEFAULT_LLM_MODEL=gpt-4o
            OPENAI_API_KEY=${OPENAI_API_KEY}
            ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
            GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
            GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
            GOOGLE_REDIRECT_URI=http://${DO_HOST}/api/auth/google/callback
            FRONTEND_URL=http://${DO_HOST}
            CORS_ORIGINS=["http://${DO_HOST}"]
            RATE_LIMIT_PER_HOUR=10
            MAX_TOKEN_LIMIT=100000
            MAX_FILE_SIZE_MB=10
            EOF

            docker compose -f docker-compose.yml pull
            docker compose -f docker-compose.yml up -d --remove-orphans
            docker image prune -f
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DO_HOST: ${{ secrets.DO_HOST }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

